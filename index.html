// ── UTILS ─────────────────────────────────────────────────────────────────────
function hash(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = (Math.imul(31, h) + str.charCodeAt(i)) | 0;
  return Math.abs(h).toString(16);
}

const LS_KEY = 'promptgen_v2';
function loadStore() {
  try { return JSON.parse(localStorage.getItem(LS_KEY) || '{"users":{},"history":{}}'); } catch { return {users:{},history:{}}; }
}
function saveStore(data) { try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch {} }

function regUser(username, pwd) {
  const data = loadStore(); const key = username.toLowerCase();
  if (data.users[key]) return false;
  data.users[key] = { username, passwordHash: hash(pwd) };
  data.history[key] = []; saveStore(data); return true;
}
function loginUser(username, pwd) {
  const data = loadStore(); const u = data.users[username.toLowerCase()];
  if (!u || u.passwordHash !== hash(pwd)) return null; return u;
}
function pushHistory(username, entry) {
  const data = loadStore(); const key = username.toLowerCase();
  if (!data.history[key]) data.history[key] = [];
  data.history[key] = [entry, ...data.history[key].slice(0, 49)];
  saveStore(data); return [...data.history[key]];
}
function getHistory(username) { const data = loadStore(); return [...(data.history[username.toLowerCase()] || [])]; }
function deleteHistoryItem(username, idx) {
  const data = loadStore(); const key = username.toLowerCase();
  data.history[key] = (data.history[key] || []).filter((_, i) => i !== idx);
  saveStore(data); return [...data.history[key]];
}
function clearHistory(username) { const data = loadStore(); data.history[username.toLowerCase()] = []; saveStore(data); }

// ── CLAUDE API ────────────────────────────────────────────────────────────────
async function callClaude(systemPrompt, userMessage) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system: systemPrompt,
      messages: [{ role: "user", content: userMessage }],
    }),
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.content?.[0]?.text || "";
}

function Field({ label, type="text", value, onChange, placeholder, accent }) {

      <div style={{position:"relative"}}>
        <input type={isPwd?(show?"text":"password"):type} value={value}
          onChange={e=>onChange(e.target.value)} placeholder={placeholder}
          onFocus={()=>setFocus(true)} onBlur={()=>setFocus(false)}
          style={{width:"100%",padding:isPwd?"13px 44px 13px 16px":"13px 16px",
            borderRadius:12,fontSize:13,fontFamily:"'DM Mono',monospace",
            color:"#E8E0D5",background:"rgba(255,255,255,0.06)",
            border:`1.5px solid ${focus?accent+"99":"rgba(255,255,255,0.1)"}`,
            outline:"none",transition:"border-color 0.2s",boxSizing:"border-box"}}/>

}

// ── AUTH SCREEN ───────────────────────────────────────────────────────────────
function AuthScreen({ onLogin, accent }) {
  const [mode, setMode] = useState("login");
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [confirm, setConfirm] = useState("");
  const [error, setError] = useState("");
  const [success, setSuccess] = useState("");
  const [loading, setLoading] = useState(false);

  function submit() {
    setError(""); setSuccess("");
    const u = username.trim();
    if (!u || !password) { setError("Remplis tous les champs."); return; }
    if (u.length < 3) { setError("Pseudo trop court (min 3)."); return; }
    if (password.length < 4) { setError("Mot de passe trop court (min 4)."); return; }
    setLoading(true);
    if (mode === "register") {
      if (password !== confirm) { setError("Mots de passe différents."); setLoading(false); return; }
      if (!regUser(u, password)) { setError("Pseudo déjà pris."); setLoading(false); return; }
      setSuccess("Compte créé !");
      setTimeout(() => { onLogin({ username: u }); setLoading(false); }, 700);
    } else {
      const user = loginUser(u, password);
      if (!user) { setError("Pseudo ou mot de passe incorrect."); setLoading(false); return; }
      onLogin({ username: user.username }); setLoading(false);
    }
  }

  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center",
      padding:"40px 28px",zIndex:10,position:"relative"}}
      onKeyDown={e=>e.key==="Enter"&&submit()}>
      <div style={{textAlign:"center",marginBottom:44}}>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:36,fontWeight:800,letterSpacing:"-1px",color:accent}}>
          PROMPT<span style={{color:"#E8E0D5"}}>GEN</span>
        </div>
        <div style={{fontSize:10,color:"#444",letterSpacing:"3px",marginTop:4}}>AI OPTIMIZER v2</div>
        <div style={{width:36,height:2,background:accent,margin:"18px auto 0"}}/>
      </div>
      <div style={{display:"flex",background:"rgba(255,255,255,0.04)",borderRadius:10,padding:4,marginBottom:26,border:"1px solid rgba(255,255,255,0.07)"}}>
        {["login","register"].map(m=>(
          <button key={m} onClick={()=>{setMode(m);setError("");setSuccess("");}}
            style={{flex:1,padding:"10px",border:"none",borderRadius:8,cursor:"pointer",
              fontFamily:"'DM Mono',monospace",fontSize:11,letterSpacing:"1.5px",
              background:mode===m?accent:"transparent",color:mode===m?"#000":"#555"}}>
            {m==="login"?"CONNEXION":"INSCRIPTION"}
          </button>
        ))}
      </div>
      <Field label="PSEUDO" value={username} onChange={setUsername} placeholder="ton_pseudo" accent={accent}/>
      <Field label="MOT DE PASSE" type="password" value={password} onChange={setPassword} placeholder="••••••" accent={accent}/>
      {mode==="register" && <Field label="CONFIRMER" type="password" value={confirm} onChange={setConfirm} placeholder="••••••" accent={accent}/>}
      {error && <div style={{padding:"10px 14px",background:"#FF444420",border:"1px solid #FF444440",borderRadius:8,color:"#FF8888",fontSize:12,marginBottom:12}}>{error}</div>}
      {success && <div style={{padding:"10px 14px",background:`${accent}20`,border:`1px solid ${accent}40`,borderRadius:8,color:accent,fontSize:12,marginBottom:12}}>{success}</div>}
      <button onClick={submit} disabled={loading} style={{width:"100%",padding:16,borderRadius:12,border:"none",
        background:loading?"rgba(255,255,255,0.05)":`linear-gradient(135deg,${accent}cc,${accent})`,
        color:loading?"#444":"#000",fontSize:13,fontFamily:"'Syne',sans-serif",fontWeight:700,
        letterSpacing:"2px",cursor:loading?"not-allowed":"pointer"}}>
        {loading?"...":(mode==="login"?"SE CONNECTER →":"CRÉER MON COMPTE →")}
      </button>
      <div style={{textAlign:"center",marginTop:18,fontSize:11,color:"#444"}}>
        {mode==="login"?"Pas de compte ? ":"Déjà inscrit ? "}
        <span onClick={()=>{setMode(mode==="login"?"register":"login");setError("");setSuccess("");}}
          style={{color:accent,cursor:"pointer",textDecoration:"underline"}}>
          {mode==="login"?"S'inscrire":"Se connecter"}
        </span>
      </div>
    </div>
  );
}

    try {
      const saved = sessionStorage.getItem("promptgen_session");
      if (saved) { const u = JSON.parse(saved); setUser(u); setHistory(getHistory(u.username)); }
    } catch {}
  }, []);

    setUser(u); setHistory(getHistory(u.username));
    try { sessionStorage.setItem("promptgen_session", JSON.stringify(u)); } catch {}
  }

  function handleLogout() {
    setUser(null); setHistory([]); setGeneratedPrompt("");
    try { sessionStorage.removeItem("promptgen_session"); } catch {}

  function saveApiKey(k) {
    setApiKey(k);
    localStorage.setItem("promptgen_gemini_key", k);
    setShowKeyModal(false);

    if (!userInput.trim()) return;
    setLoading(true); setGeneratedPrompt(""); setError("");
    try {
      const cat = selectedCat ? `Catégorie: ${CATEGORIES.find(c=>c.id===selectedCat)?.label}. ` : "";
      const userMsg = `${cat}Crée un prompt ultra-optimisé pour: "${userInput}"\nIA cible: ${ai.name}`;

                {/* Categories */}
                <div style={{marginBottom:16}}>
                  <div style={{fontSize:9,letterSpacing:"2px",color:"#444",marginBottom:9}}>CATÉGORIE <span style={{color:"#2a2a2a"}}>(optionnel)</span></div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
                    {CATEGORIES.map(c=>(
                      <button key={c.id} onClick={()=>setSelectedCat(selectedCat===c.id?null:c.id)}
                        style={{padding:"5px 11px",borderRadius:20,cursor:"pointer",
                          border:selectedCat===c.id?`1px solid ${ai.color}77`:"1px solid rgba(255,255,255,0.08)",
                          background:selectedCat===c.id?`${ai.color}22`:"transparent",
                          color:selectedCat===c.id?ai.accent:"#555",fontSize:11,fontFamily:"'DM Mono',monospace"}}>
                        {c.icon} {c.label}
                      </button>
                    ))}
                  </div>
                </div>

                {/* Tips */}
                <div style={{background:`${ai.color}10`,border:`1px solid ${ai.color}25`,borderRadius:10,padding:"11px 13px",marginBottom:14}}>
                  <div style={{fontSize:9,letterSpacing:"2px",color:ai.accent,marginBottom:7}}>TIPS {ai.name.toUpperCase()}</div>
                  {ai.tips.map((t,i)=>(
                    <div key={i} style={{fontSize:11,color:"#777",marginBottom:i<2?4:0,display:"flex",gap:7}}>
                      <span style={{color:ai.color}}>→</span>{t}
                    </div>
                  ))}
                </div>

                {/* Textarea */}
                <div style={{marginBottom:13}}>
                  <div style={{fontSize:9,letterSpacing:"2px",color:"#444",marginBottom:9}}>VOTRE IDÉE</div>
                  <textarea value={userInput} onChange={e=>setUserInput(e.target.value)}
                    placeholder="Ex: Créer un plan de contenu pour les réseaux sociaux..." rows={4}
                    onFocus={e=>e.target.style.borderColor=`${ai.color}77`}
                    onBlur={e=>e.target.style.borderColor=`${ai.color}28`}
                    style={{width:"100%",background:"rgba(255,255,255,0.04)",
                      border:`1.5px solid ${ai.color}28`,borderRadius:12,
                      padding:"13px 15px",fontSize:13,color:"#E8E0D5",
                      resize:"none",outline:"none",lineHeight:1.6}}/>
                </div>

                <button onClick={generate} disabled={loading||!userInput.trim()} style={{
                  width:"100%",padding:15,borderRadius:12,border:"none",
                  background:loading||!userInput.trim()?"rgba(255,255,255,0.05)":`linear-gradient(135deg,${ai.color},${ai.accent})`,
                  color:loading||!userInput.trim()?"#3a3a3a":"#000",
                  fontSize:12,fontFamily:"'Syne',sans-serif",fontWeight:700,letterSpacing:"2px",
                  cursor:loading||!userInput.trim()?"not-allowed":"pointer"}}>
                  {loading?"GÉNÉRATION...":"⚡ OPTIMISER LE PROMPT"}
                </button>

                {error && <div style={{marginTop:11,padding:"9px 13px",background:"#FF444418",
                  border:"1px solid #FF44443a",borderRadius:8,color:"#FF8888",fontSize:12}}>{error}</div>}

                {(loading||generatedPrompt) && (
                  <div className="anim-up" style={{marginTop:18,background:"rgba(255,255,255,0.03)",
                    border:`1px solid ${ai.color}38`,borderRadius:13,overflow:"hidden"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                      padding:"10px 15px",background:`${ai.color}0e`,borderBottom:`1px solid ${ai.color}1a`}}>
                      <span style={{fontSize:9,letterSpacing:"2px",color:ai.accent}}>PROMPT — {ai.name.toUpperCase()}</span>
                      {generatedPrompt && (
                        <button onClick={()=>copy(generatedPrompt,"main")} style={{
                          background:copied==="main"?`${ai.color}35`:"transparent",
                          border:`1px solid ${ai.color}38`,borderRadius:6,padding:"3px 9px",
                          color:copied==="main"?ai.accent:"#555",fontSize:10,
                          fontFamily:"'DM Mono',monospace",cursor:"pointer",letterSpacing:"1px"}}>
                          {copied==="main"?"✓ COPIÉ":"COPIER"}
                        </button>
                      )}
                    </div>
                    <div style={{padding:15,minHeight:70}}>
                      {loading?<Dots color={ai.color}/>:
                        <p style={{fontSize:12.5,lineHeight:1.8,color:"#C0B8B0",whiteSpace:"pre-wrap"}}>{generatedPrompt}</p>}
                    </div>
                  </div>
                )}
              </div>
            )}

            {activeTab==="history" && (
              <div className="anim-fade">
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                  <div style={{fontSize:9,letterSpacing:"2px",color:"#444"}}>
                    {history.length} PROMPT{history.length!==1?"S":""} SAUVEGARDÉS
                  </div>
                  {history.length>0 && (
                    <button onClick={()=>{clearHistory(user.username);setHistory([]);}}
                      style={{background:"transparent",border:"1px solid rgba(255,60,60,0.2)",
                        borderRadius:6,padding:"3px 9px",color:"#FF6666",fontSize:10,
                        fontFamily:"'DM Mono',monospace",cursor:"pointer",letterSpacing:"1px"}}>
                      TOUT EFFACER
                    </button>
                  )}
                </div>
                {history.length===0 ? (
                  <div style={{textAlign:"center",padding:"60px 20px",color:"#2a2a2a"}}>
                    <div style={{fontSize:34,marginBottom:10}}>◎</div>
                    <div style={{fontSize:13,color:"#3a3a3a"}}>Aucun prompt généré</div>
                  </div>
                ) : history.map((item,i)=>{
                  const isExp = expanded===i;
                  return (
                    <div key={i} style={{marginBottom:10,background:"rgba(255,255,255,0.03)",
                      border:`1px solid ${item.aiColor}28`,borderRadius:12,overflow:"hidden"}}>
                      <div style={{padding:"10px 13px",background:`${item.aiColor}10`,
                        display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <div style={{display:"flex",alignItems:"center",gap:7}}>
                          <span style={{color:item.aiAccent,fontSize:13}}>{item.aiIcon}</span>
                          <span style={{fontSize:11,color:item.aiAccent,fontFamily:"'Syne',sans-serif",fontWeight:700}}>{item.aiName}</span>
                          {item.category && <span style={{fontSize:9,color:"#444",background:"rgba(255,255,255,0.04)",padding:"2px 7px",borderRadius:10}}>{item.category}</span>}
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:7}}>
                          <span style={{fontSize:9,color:"#3a3a3a"}}>{fmtDate(item.date)}</span>
                          <button onClick={()=>{setHistory(deleteHistoryItem(user.username,i));if(expanded===i)setExpanded(null);}}
                            style={{background:"none",border:"none",color:"#3a3a3a",fontSize:16,cursor:"pointer",lineHeight:1,padding:"0 2px"}}>×</button>
                        </div>
                      </div>
                      <div style={{padding:"11px 13px"}}>
                        <div style={{fontSize:11,color:"#555",marginBottom:7,display:"flex",gap:5}}>
                          <span style={{color:item.aiColor}}>→</span>
                          <span style={{lineHeight:1.5}}>{item.input}</span>
                        </div>
                        <div style={{fontSize:12,color:"#9A9290",lineHeight:1.7,
                          ...(isExp?{}:{display:"-webkit-box",WebkitLineClamp:3,WebkitBoxOrient:"vertical",overflow:"hidden"})}}>
                          {item.prompt}
                        </div>
                        <div style={{display:"flex",gap:7,marginTop:10}}>
                          <button onClick={()=>setExpanded(isExp?null:i)}
                            style={{background:"transparent",border:`1px solid ${item.aiColor}22`,borderRadius:6,
                              padding:"4px 10px",color:"#555",fontSize:10,fontFamily:"'DM Mono',monospace",cursor:"pointer",letterSpacing:"1px"}}>
                            {isExp?"RÉDUIRE":"VOIR TOUT"}
                          </button>
                          <button onClick={()=>copy(item.prompt,i)}
                            style={{background:copied===i?`${item.aiColor}28`:"transparent",
                              border:`1px solid ${item.aiColor}28`,borderRadius:6,padding:"4px 10px",
                              color:copied===i?item.aiAccent:"#555",fontSize:10,fontFamily:"'DM Mono',monospace",cursor:"pointer",letterSpacing:"1px"}}>
                            {copied===i?"✓ COPIÉ":"COPIER"}
                          </button>
                          <button onClick={()=>{const m=AI_MODELS.find(x=>x.id===item.ai);if(m)setSelectedAI(m);setUserInput(item.input);setActiveTab("generate");setGeneratedPrompt("");}}
                            style={{background:"transparent",border:"1px solid rgba(255,255,255,0.07)",borderRadius:6,
                              padding:"4px 10px",color:"#444",fontSize:10,fontFamily:"'DM Mono',monospace",cursor:"pointer",letterSpacing:"1px"}}>
                            RELANCER
                          </button>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",
            width:220,height:90,pointerEvents:"none",
            background:`radial-gradient(ellipse,${ai.color}22 0%,transparent 70%)`}}/>
        </>
      )}

      {/* KeyModal removed - using Claude API */}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
setTimeout(()=>{ const s=document.getElementById("splash"); if(s){s.classList.add("hide");setTimeout(()=>s.remove(),400);} },600);
</script>

<script>
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>navigator.serviceWorker.register("/sw.js").catch(()=>{}));
}
</script>
</body>
</html>
